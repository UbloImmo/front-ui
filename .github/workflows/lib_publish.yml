name: Lib Build & Publish
run-name: Building & publishing library to NPM
on:
  workflow_call:
    inputs:
      pre-release:
        description: "Whether the new release is a pre-release"
        required: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  publish_lib:
    name: Build & Publish NPM package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        id: bun_setup
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check bun
        id: bun_check
        run: |
          which bun
          bun --version

      - name: Setup node
        id: node_setup
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      # Ensure latest npm (11.5.1) or later for trusted publishing
      - name: Install latest NPM
        id: npm_install_latest
        run: npm install -g npm@latest

      - name: Check node
        id: node_check
        run: |
          which node
          node --version
          which npm
          npm --version

      - name: Setup git
        id: git_setup
        env:
          CI_COMMIT_AUTHOR: CI
          CI_COMMIT_EMAIL: ci@users.noreply.github.com
        run: |
          git config --global user.email "${{ env.CI_COMMIT_EMAIL }}"
          git config --global user.name "${{ env.CI_COMMIT_AUTHOR }}"

      - name: Install deps
        id: install_deps
        run: bun install

      - name: Build & Publish package (pre release)
        id: package_publish_pre_release
        if: ${{ inputs.pre-release }}
        run: npm publish --provenance --access public --tag beta

      - name: Build & Publish package
        id: package_publish
        if: ${{ !(inputs.pre-release) }}
        run: npm publish --provenance --access public

  trigger_release:
    name: "Trigger release"
    needs: publish_lib
    uses: "./.github/workflows/release.yml"
    secrets: inherit
    with:
      pre-release: "${{ inputs.pre-release }}"
