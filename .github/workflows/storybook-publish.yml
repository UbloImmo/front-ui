name: CD Publish - Storybook

on:
  push:
    branches:
      - "main"
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
   build-storybook:
    name: Build Storybook Image
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v3
      - name: Build & Push Storybook
        uses: ./.github/actions/build-to-do
        with:
          do-access-token: ${{secrets.DIGITALOCEAN_ACCESS_TOKEN}}
          repo-name: front-ui-storybook
          context-path: ./ 
          cache-size: min 
    trigger-publish:
      name: Trigger Publish
      runs-on: ubuntu-latest
      needs:
        - build-storybook
      steps:
        - name: Install DigitalOcean Controller
          uses: digitalocean/action-doctl@v2
          with:
            token: ${{secrets.DIGITALOCEAN_ACCESS_TOKEN}}
        - name: Trigger deployment for shared env
          run: |
              doctl apps create-deployment --force-rebuild ${{secrets.DO_STAGING__APP_ID}}
