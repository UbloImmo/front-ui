
name: Token update
run-name: Updating tokens
on: 
  - workflow_dispatch
  - workflow_call

jobs:
  update_tokens:
    name: Update tokens
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch bumper app token"
        id: bumper_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BUMPER_APP_ID }}
          private-key: ${{ secrets.BUMPER_SECRET }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.bumper_token.outputs.token }}
      
      - name: Setup node
        id: node_setup
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Check node
        id: node_check
        run: |
          which node
          node --version
          which npm
          npm --version

      - name: Setup Bun
        id: bun_setup
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check bun
        id: bun_check
        run: |
          which bun
          bun --version

      - name: Setup jq
        id: jq_setup
        uses: dcarbone/install-jq-action@v2.1.0
  
      - name: Check jq
        id: jq_check
        run: |
          which jq
          jq --version

      - name: Setup git
        id: git_setup
        env:
          CI_COMMIT_AUTHOR: github-actions
          CI_COMMIT_EMAIL: github-actions@github.com
        run: |
          git config user.email "${{ env.CI_COMMIT_EMAIL }}"
          git config user.name "${{ env.CI_COMMIT_AUTHOR }}"

      - name: Install deps
        id: install_deps
        run: bun install

      - name: Get pre-update tokens version
        id: pre_update_version
        run: |
          pre_bump_version=$(cat package.json | jq -r ".dependencies[\"@ubloimmo/front-tokens\"]")
          echo "pre_bump_version=$pre_bump_version" >> $GITHUB_OUTPUT

      - name: Bump @ubloimmo/front-tokens
        id: bump_tokens
        run: bun update @ubloimmo/front-tokens --latest

      - name: Get post-update tokens version
        id: post_update_version
        run: |
          post_bump_version=$(cat package.json | jq -r ".dependencies[\"@ubloimmo/front-tokens\"]")
          echo "post_bump_version=$post_bump_version" >> $GITHUB_OUTPUT

      - name: Commit updated dependencies
        id: deps_commit
        if: steps.pre_update_version.outputs.pre_bump_version != steps.post_update_version.outputs.post_bump_version
        run: |
          git add "package.json"
          git add "bun.lockb"
          git commit -m "ci: bump @ubloimmo/front-tokens"

      - name: Update changelog (tokens version bump)
        id: changelog_update_tokens
        if: steps.pre_update_version.outputs.pre_bump_version != steps.post_update_version.outputs.post_bump_version
        run: |
          bun run changelog:changed "- Updated \`@ubloimmo/front-tokens\` to \`$NEW_TOKENS_VERSION\`"
          git add "CHANGELOG.md"
          git commit -m "ci: update changelog"
        env:
          NEW_TOKENS_VERSION: ${{ steps.post_update_version.outputs.post_bump_version }}

        
      - name: Generate & commit icons
        id: icons_generation
        if: steps.pre_update_version.outputs.pre_bump_version != steps.post_update_version.outputs.post_bump_version
        run: |
          bun run icons:generate
          git add "src/components/Icon"
          echo "generated_icons_count=$(echo $(./scripts/utils/staged-file-count.sh))" >> $GITHUB_OUTPUT
          git commit -m "ci: generate icons"
        
      - name: Update changelog
        id: changelog_update
        if: steps.icons_generation.outputs.generated_icons_count > 0
        run: |
          bun run changelog:changed "- Updated or added $GENERATED_ICONS_COUNT new icon(s)"
          git add "CHANGELOG.md"
          git commit -m "ci: update changelog"
        env:
          GENERATED_ICONS_COUNT: ${{ steps.icons_generation.outputs.generated_icons_count }}

      - name: Run tests
        id: run_tests
        run: bun test:all

      - name: Push updates
        id: revision_push
        if: (steps.pre_update_version.outputs.pre_bump_version != steps.post_update_version.outputs.post_bump_version) || steps.icons_generation.outputs.generated_icons_count > 0
        run: git push
        env:
          GITHUB_TOKEN: ${{ steps.bumper_token.outputs.token }}

          
          


